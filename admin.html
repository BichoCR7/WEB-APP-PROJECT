<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — FundiConnect</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --sidebar-w: 240px; --red: #F85149; --amber: #E3B341; --blue-light: #79C0FF; --border-blue: rgba(0,122,204,0.35); --radius-xl: 20px; --shadow-lg: 0 20px 60px rgba(0,0,0,0.5); }
    body { display:flex; min-height:100vh; padding:0; background:var(--bg-dark); }

    /* ── Sidebar ── */
    .sidebar {
      width:var(--sidebar-w); background:var(--bg-panel); border-right:1px solid var(--border);
      display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:200;
      overflow-y:auto;
    }
    .sidebar-brand {
      padding:20px 20px 16px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .sidebar-brand .logo-icon { width:34px; height:34px; border-radius:8px; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:1rem; }
    .sidebar-brand span { font-weight:800; font-size:1rem; }
    .sidebar-label { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); padding:20px 20px 8px; }
    .sidebar-nav { list-style:none; padding:0 10px; }
    .sidebar-nav li a {
      display:flex; align-items:center; gap:12px; padding:10px 12px;
      border-radius:8px; color:var(--text-secondary); font-size:.88rem; font-weight:500;
      transition:all .2s; text-decoration:none;
    }
    .sidebar-nav li a:hover, .sidebar-nav li a.active {
      background:var(--bg-elevated); color:var(--text-primary);
    }
    .sidebar-nav li a.active { color:var(--blue-light); background:var(--blue-glow); }
    .sidebar-nav li a .icon { font-size:1.1rem; width:20px; text-align:center; }
    .sidebar-footer { margin-top:auto; padding:16px; border-top:1px solid var(--border); }
    .admin-user { display:flex; align-items:center; gap:10px; }
    .admin-avatar {
      width:36px; height:36px; border-radius:50%;
      background:linear-gradient(135deg,var(--blue),var(--green));
      display:flex; align-items:center; justify-content:center;
      font-size:.85rem; font-weight:700; color:#fff;
    }
    .admin-info small { display:block; font-size:.72rem; color:var(--text-muted); }

    /* ── Main ── */
    .admin-main { margin-left:var(--sidebar-w); flex:1; padding:28px 32px; min-height:100vh; }
    .admin-topbar {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:28px;
    }
    .topbar-title h1 { font-size:1.5rem; font-weight:800; }
    .topbar-title p  { font-size:.85rem; color:var(--text-muted); margin-top:2px; }
    .topbar-actions { display:flex; align-items:center; gap:12px; }
    .notif-btn {
      position:relative; width:40px; height:40px; border-radius:10px;
      background:var(--bg-card); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      font-size:1.1rem;
    }
    .notif-dot {
      position:absolute; top:6px; right:6px; width:8px; height:8px;
      background:var(--red); border-radius:50%; border:2px solid var(--bg-dark);
    }

    /* ── Stats grid ── */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md);
      padding:20px; position:relative; overflow:hidden; transition:all .2s;
    }
    .stat-card:hover { border-color:var(--blue); transform:translateY(-2px); }
    .stat-card::before {
      content:''; position:absolute; top:0; right:0; width:80px; height:80px;
      border-radius:50%; opacity:.08;
      background:var(--accent-color, var(--blue));
      transform:translate(30px,-30px);
    }
    .stat-icon { font-size:1.4rem; margin-bottom:12px; }
    .stat-value { font-size:1.9rem; font-weight:800; font-family:'JetBrains Mono',monospace; }
    .stat-label { font-size:.8rem; color:var(--text-muted); margin-top:4px; }
    .stat-trend { display:flex; align-items:center; gap:4px; font-size:.78rem; margin-top:8px; font-weight:600; }
    .trend-up   { color:var(--green); }
    .trend-down { color:var(--red); }

    /* ── Panels ── */
    .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
    .admin-panel {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden;
    }
    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 22px; border-bottom:1px solid var(--border);
    }
    .panel-header h3 { font-size:.95rem; font-weight:700; }
    .panel-body { padding:18px 22px; }
    .panel-full { grid-column:1/-1; }

    /* ── Table ── */
    .data-table { width:100%; border-collapse:collapse; font-size:.85rem; }
    .data-table th {
      text-align:left; padding:10px 14px; font-size:.75rem; font-weight:700;
      letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted);
      border-bottom:1px solid var(--border); background:var(--bg-elevated);
    }
    .data-table td { padding:12px 14px; border-bottom:1px solid var(--border-subtle); vertical-align:middle; }
    .data-table tr:last-child td { border-bottom:none; }
    .data-table tr:hover td { background:rgba(255,255,255,.02); }
    .user-row { display:flex; align-items:center; gap:10px; }
    .ua { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; flex-shrink:0; }

    /* ── Status badges ── */
    .status { display:inline-flex; align-items:center; gap:5px; font-size:.75rem; font-weight:600; padding:3px 10px; border-radius:100px; }
    .status::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
    .status-pending  { background:rgba(227,179,65,.15); color:var(--amber); }
    .status-approved { background:rgba(78,201,176,.15); color:var(--green); }
    .status-active   { background:rgba(78,201,176,.15); color:var(--green); }
    .status-banned   { background:rgba(248,81,73,.15); color:var(--red); }
    .status-dispute  { background:rgba(197,134,192,.15); color:var(--purple); }
    .status-completed { background:rgba(78,201,176,.15); color:var(--green); }

    /* ── Action buttons ── */
    .action-btns { display:flex; gap:6px; }
    .act { padding:5px 12px; border-radius:6px; font-size:.78rem; font-weight:600; cursor:pointer; border:1px solid transparent; transition:all .2s; }
    .act-approve { background:rgba(78,201,176,.15); color:var(--green); border-color:rgba(78,201,176,.3); }
    .act-approve:hover { background:rgba(78,201,176,.3); }
    .act-reject  { background:rgba(248,81,73,.1); color:var(--red); border-color:rgba(248,81,73,.25); }
    .act-reject:hover { background:rgba(248,81,73,.2); }
    .act-view    { background:var(--bg-elevated); color:var(--text-secondary); border-color:var(--border); }
    .act-view:hover { color:var(--text-primary); }
    .act-ban     { background:rgba(248,81,73,.1); color:var(--red); border-color:rgba(248,81,73,.25); }

    /* ── Approval Queue ── */
    .approval-card {
      background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px;
      padding:16px; margin-bottom:12px; display:flex; align-items:flex-start; gap:14px;
    }
    .approval-card:last-child { margin-bottom:0; }
    .appr-avatar {
      width:44px; height:44px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,var(--blue),var(--purple));
      display:flex; align-items:center; justify-content:center; font-size:1.1rem; color:#fff; font-weight:700;
    }
    .appr-meta { flex:1; }
    .appr-meta h4 { font-size:.9rem; margin-bottom:3px; }
    .appr-meta p  { font-size:.78rem; color:var(--text-muted); }
    .appr-tags { display:flex; flex-wrap:wrap; gap:5px; margin:8px 0; }
    .appr-tag { font-size:.72rem; background:var(--blue-glow); color:var(--blue-light); border:1px solid var(--border-blue); padding:2px 8px; border-radius:100px; }
    .doc-links { display:flex; gap:8px; margin-top:6px; }
    .doc-link { font-size:.74rem; color:var(--blue-light); background:var(--bg-card); padding:3px 10px; border-radius:6px; border:1px solid var(--border); cursor:pointer; }
    .doc-link:hover { border-color:var(--blue); }

    /* ── Analytics ── */
    .chart-bar-wrap { display:flex; align-items:flex-end; gap:6px; height:100px; padding:8px 0; }
    .chart-bar {
      flex:1; border-radius:4px 4px 0 0; background:var(--blue-glow);
      border:1px solid var(--border-blue); position:relative; cursor:pointer;
      transition:all .2s; min-width:16px;
    }
    .chart-bar:hover { background:rgba(0,122,204,.4); }
    .chart-bar[data-active="true"] { background:var(--blue); border-color:var(--blue-bright); }
    .chart-label { display:flex; justify-content:space-between; font-size:.72rem; color:var(--text-muted); margin-top:8px; }
    .chart-tooltip {
      position:absolute; top:-32px; left:50%; transform:translateX(-50%);
      background:var(--bg-elevated); border:1px solid var(--border); border-radius:6px;
      padding:3px 8px; font-size:.72rem; white-space:nowrap; opacity:0; pointer-events:none;
      transition:opacity .15s;
    }
    .chart-bar:hover .chart-tooltip { opacity:1; }

    /* ── Donut ── */
    .donut-wrap { display:flex; align-items:center; gap:24px; }
    .donut-svg { flex-shrink:0; }
    .donut-legend { }
    .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:.82rem; }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

    /* ── Dispute cards ── */
    .dispute-card {
      background:var(--bg-elevated); border:1px solid rgba(248,81,73,.2);
      border-radius:10px; padding:16px; margin-bottom:12px;
    }
    .dispute-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .dispute-id { font-size:.72rem; font-family:'JetBrains Mono',monospace; color:var(--text-muted); }
    .dispute-body p { font-size:.83rem; color:var(--text-secondary); margin-bottom:12px; }
    .dispute-parties { display:flex; gap:12px; margin-bottom:12px; }
    .dispute-party { font-size:.78rem; background:var(--bg-card); padding:4px 10px; border-radius:6px; border:1px solid var(--border); }

    /* ── Revenue ── */
    .rev-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border-subtle); }
    .rev-row:last-child { border-bottom:none; }
    .rev-label { font-size:.83rem; }
    .rev-val { font-size:.88rem; font-weight:700; font-family:'JetBrains Mono',monospace; }

    /* ── Notif Panel ── */
    .notif-panel {
      position:absolute; top:48px; right:0; width:300px;
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md);
      box-shadow:var(--shadow-lg); z-index:100; display:none;
    }
    .notif-panel.open { display:block; }
    .notif-panel-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
    .notif-item { display:flex; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border-subtle); }
    .notif-item:hover { background:var(--bg-elevated); }
    .notif-item:last-child { border-bottom:none; }
    .notif-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; }
    .notif-text p { font-size:.8rem; font-weight:500; margin-bottom:2px; }
    .notif-text small { font-size:.72rem; color:var(--text-muted); }

    /* ── Tabs ── */
    .tab-row { display:flex; gap:4px; padding:4px; background:var(--bg-elevated); border-radius:10px; margin-bottom:20px; }
    .tab-btn { flex:1; padding:8px 12px; border-radius:8px; border:none; background:none; color:var(--text-secondary); font-size:.83rem; font-weight:600; cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; }
    .tab-btn.active { background:var(--bg-card); color:var(--text-primary); box-shadow:0 1px 4px rgba(0,0,0,.3); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }

    /* ── Search & Filter ── */
    .filter-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .filter-search { flex:1; background:var(--bg-elevated); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text-primary); font-size:.85rem; font-family:'DM Sans',sans-serif; }
    .filter-search:focus { outline:none; border-color:var(--blue); }
    .filter-select { background:var(--bg-elevated); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text-secondary); font-size:.83rem; cursor:pointer; }

    /* ── Toast ── */
    .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
    .toast { display:flex; align-items:center; gap:10px; padding:12px 18px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px; font-size:.85rem; box-shadow:0 8px 24px rgba(0,0,0,.4); animation:fadeUp .3s ease; min-width:240px; }
    .toast.success { border-color:rgba(78,201,176,.4); }
    .toast.error   { border-color:rgba(248,81,73,.4); }
    .toast.info    { border-color:rgba(0,122,204,.4); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* ── Responsive ── */
    @media(max-width:900px) {
      .admin-main { margin-left:0; padding:16px; }
      .sidebar { display:none; }
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .admin-grid { grid-template-columns:1fr; }
    }
    @media(max-width:600px) { .stats-row { grid-template-columns:1fr; } }

    .page { display:none; }
    .page.active { display:block; }
  </style>
</head>
