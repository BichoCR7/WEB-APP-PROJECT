<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Us — FundiConnect</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --blue-light:#79C0FF; --border-blue:rgba(0,122,204,0.35); --radius-xl:24px; --shadow-lg:0 20px 60px rgba(0,0,0,.5); }
    .page-hero {
      min-height:70vh; display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden; padding:120px 24px 80px;
      text-align:center;
    }
    .hero-glow {
      position:absolute; inset:0; pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,122,204,.18) 0%, transparent 70%);
    }
    .hero-grid {
      position:absolute; inset:0; pointer-events:none; opacity:.04;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),
        linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:50px 50px;
    }
    .hero-content { position:relative; z-index:1; max-width:700px; margin:0 auto; }
    .hero-chip {
      display:inline-flex; align-items:center; gap:8px; padding:7px 18px;
      background:rgba(0,122,204,.12); border:1px solid var(--border-blue);
      border-radius:100px; font-size:.82rem; font-weight:600; color:var(--blue-light);
      margin-bottom:24px;
    }
    .hero-title { font-size:clamp(2.2rem,5vw,3.5rem); font-weight:900; line-height:1.1; margin-bottom:20px; }
    .hero-title span { background:linear-gradient(90deg,var(--blue-bright),var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-sub { font-size:1.05rem; max-width:560px; margin:0 auto 32px; }

    /* ── Mission ── */
    .mission-wrap { display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; }
    .mission-visual {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl);
      padding:36px; position:relative; overflow:hidden;
    }
    .mission-visual::before {
      content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px;
      border-radius:50%; background:radial-gradient(circle,rgba(0,122,204,.2),transparent 70%);
    }
    .mission-stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; position:relative; z-index:1; }
    .m-stat { background:var(--bg-elevated); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
    .m-stat .val { font-size:2rem; font-weight:900; font-family:'JetBrains Mono',monospace; background:linear-gradient(135deg,var(--blue-bright),var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .m-stat .lbl { font-size:.78rem; color:var(--text-muted); margin-top:4px; }

    /* ── Values ── */
    .value-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl);
      padding:32px; transition:all .25s; text-align:center;
    }
    .value-card:hover { border-color:var(--blue); transform:translateY(-4px); box-shadow:0 20px 50px rgba(0,0,0,.4); }
    .value-icon {
      width:64px; height:64px; border-radius:18px; margin:0 auto 20px;
      display:flex; align-items:center; justify-content:center; font-size:1.8rem;
    }
    .value-card h3 { margin-bottom:10px; font-size:1.05rem; }

    /* ── Timeline ── */
    .timeline { position:relative; padding-left:32px; }
    .timeline::before { content:''; position:absolute; left:12px; top:0; bottom:0; width:2px; background:var(--border); }
    .tl-item { position:relative; margin-bottom:32px; }
    .tl-dot {
      position:absolute; left:-27px; top:4px; width:18px; height:18px;
      border-radius:50%; background:var(--blue); border:3px solid var(--bg-dark);
      box-shadow:0 0 0 3px rgba(0,122,204,.3);
    }
    .tl-year { font-size:.75rem; font-family:'JetBrains Mono',monospace; color:var(--blue-light); font-weight:700; margin-bottom:4px; }
    .tl-title { font-size:1rem; font-weight:700; margin-bottom:6px; }
    .tl-desc { font-size:.85rem; color:var(--text-secondary); }

    /* ── Team ── */
    .team-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl);
      padding:28px; text-align:center; transition:all .25s;
    }
    .team-card:hover { border-color:var(--blue); transform:translateY(-4px); }
    .team-avatar {
      width:80px; height:80px; border-radius:50%; margin:0 auto 16px;
      display:flex; align-items:center; justify-content:center;
      font-size:2rem; font-weight:800; color:#fff;
    }
    .team-card h4 { font-size:1rem; margin-bottom:4px; }
    .team-card .role { font-size:.8rem; color:var(--blue-light); font-weight:600; margin-bottom:8px; }
    .team-card p { font-size:.8rem; }
    .social-links { display:flex; justify-content:center; gap:10px; margin-top:14px; }
    .social-link {
      width:32px; height:32px; border-radius:8px; background:var(--bg-elevated);
      border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
      font-size:.85rem; cursor:pointer; transition:all .2s;
    }
    .social-link:hover { border-color:var(--blue); background:var(--blue-glow); }

    /* ── CTA ── */
    .cta-band {
